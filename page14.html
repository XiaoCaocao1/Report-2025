<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025年度学习报告 - 第14页</title>
    <style>
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        
        /* 页面容器 */
        .page-container {
            width: 375px;
            height: 812px;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        /* 背景图片 */
        .bg-image {
            width: 375px;
            height: 812px;
            left: 0px;
            top: 0px;
            position: absolute;
            object-fit: cover;
        }
        
        /* 标题 */
        .title {
            width: 459px;
            height: 209px;
            left: -42px;
            top: 63px;
            position: absolute;
            text-align: center;
            color: white;
            font-size: 32px;
            font-weight: 400;
            text-shadow: 0px 4px 4px rgba(0, 0, 0, 1.00);
        }
        
        /* 底部文本 */
        .footer-text {
            width: 293px;
            height: 56px;
            left: 41px;
            top: 659px;
            position: absolute;
            text-align: center;
            color: white;
            font-size: 20px;
            font-weight: 400;
            text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
        }
        
        /* 关键词样式 */
        .keyword {
            position: absolute;
            text-align: center;
            color: white;
            font-weight: 400;
            word-wrap: break-word;
        }
        
        .keyword-explore {
            width: 130px;
            height: 47px;
            left: 135px;
            top: 248px;
            font-size: 48px;
            text-shadow: 0px 6px 4px rgba(0, 116, 179, 1.00);
        }
        
        .keyword-curious {
            width: 217px;
            height: 96px;
            left: 0px;
            top: 310px;
            font-size: 75px;
            text-shadow: 5px 5px 4px rgba(0, 96, 143, 1.00);
        }
        
        .keyword-persist {
            width: 130px;
            height: 47px;
            left: 201px;
            top: 354px;
            font-size: 40px;
            text-shadow: -4px 4px 4px rgba(0, 157, 234, 1.00);
        }
        
        .keyword-focus {
            width: 130px;
            height: 47px;
            left: 226px;
            top: 434px;
            font-size: 55px;
            text-shadow: -4px -4px 4px rgba(0, 135, 204, 1.00);
        }
        
        .keyword-think {
            width: 130px;
            height: 47px;
            left: 87px;
            top: 406px;
            font-size: 48px;
            text-shadow: 3px -4px 4px rgba(0, 157, 234, 1.00);
        }
        
        .keyword-interact {
            width: 130px;
            height: 47px;
            left: 112px;
            top: 486px;
            font-size: 36px;
            text-shadow: 0px -4px 4px rgba(0, 157, 234, 1.00);
        }
        
        /* 箭头图标 */
        .arrow-icon {
            width: 29px;
            height: 28px;
            left: 210px;
            top: 759px;
            position: absolute;
            transform: rotate(180deg);
            transform-origin: top left;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .arrow-icon:hover {
            transform: rotate(180deg) scale(1.1);
        }
        
        .arrow-icon:active {
            transform: rotate(180deg) scale(0.95);
        }
        
        /* 字体定义 */
        .font-bold {
            font-family: "Impact", "Arial Black", sans-serif;
        }
        
        .font-regular {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        
        /* 响应式调整 */
        @media (max-width: 400px) {
            .page-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="page-container">
        <!-- 背景图片 -->
        <img class="bg-image" src="assets/page14/bg.png" alt="背景图片">
        
        <!-- 标题 -->
        <div class="title font-bold">2025<br/>你的年度学习关键词</div>
        
        <!-- 底部文本 -->
        <div class="footer-text font-regular">
            这些关键词如星子般汇聚<br/>
            勾勒出你精神宇宙的璀璨轮廓
        </div>
        
        <!-- 学习关键词 -->
        <div class="keyword keyword-explore font-bold">探索</div>
        <div class="keyword keyword-curious font-bold">好奇</div>
        <div class="keyword keyword-persist font-regular">坚持</div>
        <div class="keyword keyword-focus font-bold">专注</div>
        <div class="keyword keyword-think font-regular">思考</div>
        <div class="keyword keyword-interact font-regular">互动</div>
        
        <!-- 箭头图标 -->
        <img class="arrow-icon" src="assets/page14/arrow.png" alt="向下翻页" onclick="nextPage()">
    </div>

    <script>
        // 向下翻页功能
        function nextPage() {
            // 获取当前页面URL
            const currentUrl = window.location.href;
            
            // 获取当前页面编号（假设URL格式为 page14.html）
            const currentPage = parseInt(currentUrl.match(/page(\d+)\.html/)?.[1]) || 14;
            
            // 计算下一页编号
            const nextPageNum = currentPage + 1;
            
            // 构建下一页URL
            let nextUrl;
            if (nextPageNum <= 14) { // 假设总共有14页
                nextUrl = currentUrl.replace(`page${currentPage}.html`, `page${nextPageNum}.html`);
            } else {
                // 如果是最后一页，回到第一页或显示结束页
                nextUrl = currentUrl.replace(`page${currentPage}.html`, 'page1.html');
            }
            
            // 跳转到下一页
            window.location.href = nextUrl;
        }

        // 添加键盘事件监听（可选功能）
        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowDown' || event.key === ' ') {
                event.preventDefault();
                nextPage();
            }
        });
    </script>
</body>
</html>
