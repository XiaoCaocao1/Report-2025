<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年度学习报告 - 第4页</title>
    <style>
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1A3732;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        
        /* 页面容器 - 深绿色黑板背景 */
        .page-container {
            width: 375px;
            height: 812px;
            position: relative;
            background: #1A3732;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        /* 教室背景图片 - 下半部 */
        .classroom-bg {
            width: 387px;
            height: 829px;
            left: -62px;
            top: 520px;  /* 教室位置下移 */
            position: absolute;
            object-fit: cover;
            opacity: 0.3;
        }
        
        /* 主标题*/
        .main-title {
            position: absolute;
            top: 40px;  
            left: 50%;  
            transform: translateX(-50%); 
            width: 354px; 
            text-align: center;
            color: white;
            font-size: 32px;
            font-weight: 600;
            line-height: 1.2;
            text-shadow: 0 4px 4px rgba(0, 0, 0, 0.25);
        }
        
        /* 副标题 */
        .sub-title {
            position: absolute;
            top: 100px; 
            left: 50%;  
            transform: translateX(-50%); 
            text-align: center;
            color: white;
            font-size: 18px;
            font-weight: 400;
            opacity: 0.9;
        }   
     
        /* 真正的饼图 */
        .pie-chart {
            width: 250px;  /* 稍微缩小 */
            height: 250px;
            left: 65px;    /* 水平居中 */
            top: 200px;    /* 显著下移，从150px移到200px */
            position: absolute;
            border-radius: 50%;
            /* 根据图片准确百分比 */
            background: conic-gradient(
                from 0deg,
                #F4C078 0deg 176.724deg,    /* 签到 49.09% */
                #EEFFAE 176.724deg 306.864deg, /* 作业 36.64% */
                #D9FFC9 306.864deg 342.216deg, /* 测试 9.81% */
                #65DEEC 342.216deg 350.856deg, /* AI咨询 2.40% */
                #F3ACAD 350.856deg 356.616deg, /* 消息 1.37% */
                #88E2CD 356.616deg 358.488deg, /* 投票 0.52% */
                #F59B51 358.488deg 360deg      /* 讨论 0.17% */
            );
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
        
        /* 饼图中心白色圆 */
        .pie-center {
            width: 70px;
            height: 70px;
            background: #1A3732;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        /* 数据标签 - 纯文本 */
        .data-label {
            position: absolute;
            line-height: 1.3;
            z-index: 10;
            font-size: 12px;
            text-align: center;
        }
        
        /* 深色文字 - 用于浅色饼图区域 */
        .label-dark {
            color: #451416;
            font-weight: 600;
        }
        
        /* 浅色文字 - 用于深色饼图区域 */
        .label-light {
            color: white;
            font-weight: 500;
        }
        
        /* 重新计算标签位置 - 饼图下移后 */
        /* 测试 - 左上 */
        .label-test { 
            left: 20px;  
            top: 220px;  /* 位置下移 */
        }
        
        /* AI咨询 - 顶部中间（有足够空间） */
        .label-ai { 
            left: 150px;  
            top: 130px;  
        }
        
        /* 签到 - 右下 */
        .label-sign { 
            left: 230px;  
            top: 300px;  
        }
        
        /* 作业 - 左下 */
        .label-homework { 
            left: 100px;  
            top: 330px;  
        }
        
        /* 消息 - 右上 */
        .label-message { 
            left: 305px;  
            top: 180px;  
        }
        
        /* 投票 - 右中 */
        .label-vote { 
            left: 310px;  
            top: 420px;  
        }
        
        /* 讨论 - 左中 */
        .label-discuss { 
            left: 20px;  
            top: 430px;  /* 位置下移 */
        }
        
        /* 数据文本样式 - 完全按照图片 */
        .data-type {
            font-size: 16px;
            font-weight: 700;
        }
        
        .data-count {
            font-size: 12px;
            margin: 2px 0;
        }
        
        .data-percent {
            font-size: 12px;
            font-weight: 600;
        }
        
        /* 分隔线 - 下移 */
        .divider-line {
            position: absolute;
            left: 20px;
            top: 500px;  /* 位置下移 */
            width: 335px;
            height: 1px;
            border-top: 2px dashed rgba(255, 255, 255, 0.2);
        }
        
        /* 右下方文字 - 教室图案上方 */
        .bottom-right-text {
            width: 188px;
            left: 174px;
            top: 560px;  /* 位置下移 */
            position: absolute;
            text-align: right;
            color: white;
            font-size: 18px;
            line-height: 1.4;
            opacity: 0.9;
        }
        
        /* 下一页按钮 */
        .next-button {
            width: 189px;
            height: 34px;
            left: 227px;
            top: 698px;
            position: absolute;
            text-align: center;
            color: white;
            font-size: 48px;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
        }
        
        .next-button:hover {
            transform: translateX(5px);
        }
        
        /* 响应式调整 */
        @media (max-width: 400px) {
            .page-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="page-container" id="page-4">
        <!-- 教室背景图片 - 像素风格教室 -->
        <img class="classroom-bg" src="assets/page4/bg-1.png" alt="像素风格教室">
        
        <!-- 标题 -->
        <div class="main-title">互动分布大揭晓</div>
        <div class="sub-title">看看大家都在干啥</div>
        
        <!-- 真正的饼图 -->
        <div class="pie-chart">
            <div class="pie-center"></div>
        </div>
        
        <!-- 数据标签 - 准确匹配图片数据 -->
        <div class="data-label label-light label-test">
            <div class="data-type">测试</div>
            <div class="data-count">148.382次</div>
            <div class="data-percent">9.81%</div>
        </div>
        
        <div class="data-label label-light label-ai">
            <div class="data-type">AI咨询</div>
            <div class="data-count">36.288次</div>
            <div class="data-percent">2.40%</div>
        </div>
        
        <div class="data-label label-dark label-sign">
            <div class="data-type">签到</div>
            <div class="data-count">742.867次</div>
            <div class="data-percent">49.09%</div>
        </div>
        
        <div class="data-label label-dark label-homework">
            <div class="data-type">作业</div>
            <div class="data-count">554.426次</div>
            <div class="data-percent">36.64%</div>
        </div>
        
        <div class="data-label label-light label-message">
            <div class="data-type">消息</div>
            <div class="data-count">20.687次</div>
            <div class="data-percent">1.37%</div>
        </div>
        
        <div class="data-label label-light label-vote">
            <div class="data-type">投票</div>
            <div class="data-count">7.882次</div>
            <div class="data-percent">0.52%</div>
        </div>
        
        <div class="data-label label-light label-discuss">
            <div class="data-type">讨论</div>
            <div class="data-count">2,661次</div>
            <div class="data-percent">0.17%</div>
        </div>
        
        <!-- 分隔线 -->
        <div class="divider-line"></div>
        
        <!-- 右下方文字 - 准确匹配图片文字 -->
        <div class="bottom-right-text">
            每次互动<br>都照亮<br>彼此前行的路
        </div>
        
        <!-- 下一页按钮 -->
        <div class="next-button" onclick="nextPage()">>>></div>
    </div>
    
    <script>
        function nextPage() {
            alert('📈 查看下一组数据...');
        }
        
        // 页面加载动画
        window.addEventListener('load', function() {
            const page = document.getElementById('page-4');
            page.style.opacity = '0';
            page.style.transform = 'scale(0.9)';
            
            setTimeout(() => {
                page.style.transition = 'all 0.8s ease-out';
                page.style.opacity = '1';
                page.style.transform = 'scale(1)';
            }, 300);
            
            // 饼图动画
            const pieChart = document.querySelector('.pie-chart');
            setTimeout(() => {
                pieChart.style.transform = 'scale(0) rotate(-180deg)';
                pieChart.style.transition = 'all 1.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
                
                setTimeout(() => {
                    pieChart.style.transform = 'scale(1) rotate(0deg)';
                    
                    // 数据标签按图片顺序出现
                    const labels = document.querySelectorAll('.data-label');
                    const order = [1, 4, 0, 3, 5, 6, 2]; // AI咨询、消息、测试、签到、作业、投票、讨论
                    
                    order.forEach((index, i) => {
                        setTimeout(() => {
                            const label = labels[index];
                            label.style.opacity = '0';
                            label.style.transform = 'translateY(10px)';
                            label.style.transition = 'all 0.5s ease-out';
                            
                            setTimeout(() => {
                                label.style.opacity = '1';
                                label.style.transform = 'translateY(0)';
                            }, 50);
                        }, i * 200);
                    });
                    
                    // 教室背景淡入
                    setTimeout(() => {
                        const classroom = document.querySelector('.classroom-bg');
                        classroom.style.opacity = '0';
                        classroom.style.transition = 'opacity 0.8s ease-out';
                        
                        setTimeout(() => {
                            classroom.style.opacity = '0.3';
                        }, 50);
                    }, 1500);
                    
                    // 底部文字淡入
                    setTimeout(() => {
                        const bottomText = document.querySelector('.bottom-right-text');
                        bottomText.style.opacity = '0';
                        bottomText.style.transition = 'opacity 0.6s ease-out';
                        
                        setTimeout(() => {
                            bottomText.style.opacity = '0.9';
                        }, 50);
                    }, 2000);
                }, 100);
            }, 500);
        });
    </script>
</body>
</html>
