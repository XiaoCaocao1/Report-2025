<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年度学习报告 - 第6页</title>
    <style>
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        
        /* 页面容器 */
        .page-container {
            width: 375px;
            height: 812px;
            position: relative;
            background: #1a1a1a; /* 深色星空背景 */
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        /* 星空背景 */
        .stars-bg {
            width: 100%;
            height: 100%;
            left: 0px;
            top: 0px;
            position: absolute;
            object-fit: fill;
            opacity: 0.95;
        }
        
        
        /* 中心文字容器 */
        .center-text {
            width: 286px;
            height: 155px;
            left: 50%;
            top: 290px;
            position: absolute;
            transform: translateX(-50%);
            text-align: center;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        
        /* 主标题 */
        .main-title {
            font-size: 48px;
            font-weight: 600;
            line-height: 1.2;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
        }
        
        /* 副标题 */
        .sub-title {
            font-size: 24px;
            font-weight: 400;
            opacity: 0.9;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        /* 下一页箭头 - 旋转90度垂直 */
        .next-arrow {
            width: 0px;
            height: 164px;
            left: 277px;
            top: 628px;
            position: absolute;
            transform: rotate(90deg);
            transform-origin: top left;
            text-align: center;
            color: white;
            font-size: 64px;
            font-weight: 400;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.3s ease;
            z-index: 20;
        }
        
        .next-arrow:hover {
            opacity: 1;
            transform: rotate(90deg) translateX(5px);
        }
        
        /* 星星装饰 */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
        }
        
        /* 不同大小的星星 */
        .star-small {
            width: 2px;
            height: 2px;
        }
        
        .star-medium {
            width: 3px;
            height: 3px;
        }
        
        .star-large {
            width: 4px;
            height: 4px;
        }
        
        /* 星星闪烁动画 */
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        /* 流星 */
        .shooting-star {
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 50%, rgba(255,255,255,0) 100%);
            animation: shoot 8s infinite ease-in-out;
        }
        
        @keyframes shoot {
            0% { transform: translateX(-100px) translateY(0) rotate(-30deg); opacity: 0; }
            10% { opacity: 1; }
            20% { transform: translateX(300px) translateY(100px) rotate(-30deg); opacity: 0; }
            100% { opacity: 0; }
        }
        
        /* 响应式调整 */
        @media (max-width: 400px) {
            .page-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="page-container" id="page-6">
        <!-- 星空背景 -->
        <img class="stars-bg" src="assets/page6/bg.png" alt="星空背景">
        
        <!-- 星空发光效果 -->
        <div class="star-glow"></div>
        
        <!-- 星星装饰 -->
        <div class="star star-small" style="left: 50px; top: 100px; animation-delay: 0s;"></div>
        <div class="star star-medium" style="left: 200px; top: 150px; animation-delay: 1s;"></div>
        <div class="star star-large" style="left: 300px; top: 200px; animation-delay: 2s;"></div>
        <div class="star star-small" style="left: 100px; top: 300px; animation-delay: 0.5s;"></div>
        <div class="star star-medium" style="left: 250px; top: 350px; animation-delay: 1.5s;"></div>
        <div class="star star-large" style="left: 150px; top: 400px; animation-delay: 2.5s;"></div>
        <div class="star star-small" style="left: 320px; top: 80px; animation-delay: 0.2s;"></div>
        <div class="star star-medium" style="left: 80px; top: 200px; animation-delay: 1.2s;"></div>
        <div class="star star-large" style="left: 280px; top: 320px; animation-delay: 0.8s;"></div>
        
        <!-- 流星 -->
        <div class="shooting-star" style="top: 150px; left: 50px; animation-delay: 0s;"></div>
        <div class="shooting-star" style="top: 300px; left: 100px; animation-delay: 3s;"></div>
        <div class="shooting-star" style="top: 250px; left: 200px; animation-delay: 6s;"></div>
        
        <!-- 中心文字 -->
        <div class="center-text">
            <div class="main-title">看看你的</div>
            <div class="main-title">个人轨迹吧~</div>
        </div>
        
        <!-- 下一页箭头 -->
        <div class="next-arrow" onclick="nextPage()">>></div>
    </div>
    
    <script>
        function nextPage() {
            alert('✨ 继续探索你的个人轨迹...');
            // 这里可以添加跳转到下一页的逻辑
        }
        
        // 页面加载动画
        window.addEventListener('load', function() {
            const page = document.getElementById('page-6');
            page.style.opacity = '0';
            page.style.transform = 'scale(0.9)';
            
            setTimeout(() => {
                page.style.transition = 'all 1s ease-out';
                page.style.opacity = '1';
                page.style.transform = 'scale(1)';
            }, 300);
            
            // 星空背景淡入
            const starsBg = document.querySelector('.stars-bg');
            setTimeout(() => {
                starsBg.style.opacity = '0';
                starsBg.style.transition = 'opacity 1.5s ease-out';
                
                setTimeout(() => {
                    starsBg.style.opacity = '0.9';
                }, 50);
            }, 500);
            
            // 文字逐行出现
            const titles = document.querySelectorAll('.main-title');
            titles.forEach((title, index) => {
                setTimeout(() => {
                    title.style.opacity = '0';
                    title.style.transform = 'translateY(20px)';
                    title.style.transition = 'all 0.8s ease-out';
                    
                    setTimeout(() => {
                        title.style.opacity = '1';
                        title.style.transform = 'translateY(0)';
                    }, 50);
                }, 800 + index * 300);
            });
            
            // 下一页箭头动画
            setTimeout(() => {
                const arrow = document.querySelector('.next-arrow');
                arrow.style.opacity = '0';
                arrow.style.transition = 'opacity 0.6s ease-out';
                
                setTimeout(() => {
                    arrow.style.opacity = '0.7';
                }, 50);
            }, 1500);
            
            // 星星动画
            const stars = document.querySelectorAll('.star');
            stars.forEach((star, index) => {
                setTimeout(() => {
                    star.style.opacity = '0';
                    setTimeout(() => {
                        star.style.opacity = '';
                    }, 50);
                }, index * 200);
            });
        });
    </script>
</body>
</html>
