<!DOCTYPE html>

    <style>
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;

        /* 页面容器 */
        .page-container {
            width: 375px;
            height: 812px;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        /* 背景图片 */
        .bg-image {
            width: 375px;
            height: 812px;
            left: 0px;
            top: 0px;
            position: absolute;
            object-fit: cover;
        }
        
        .phone {
            width: 284px;
            height: 425px;
            left: 43px;
            top: 226px;
            position: absolute;
            object-fit: contain;
            opacity: 1;
            image-rendering: high-quality; /* 高质量缩放 */

            left: 61px;
            top: 71px;
            position: absolute;

            font-family: "Impact", "Arial Black", sans-serif;
