<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025年度学习报告 - 第15页</title>
    <style>
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        
        /* 页面容器 */
        .page-container {
            width: 375px;
            height: 812px;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        /* 背景图片 */
        .bg-image {
            width: 375px;
            height: 812px;
            left: 0px;
            top: 0px;
            position: absolute;
            object-fit: cover;
        }
        
        /* 文本内容 */
        .text-processing {
            width: 459px;
            height: 209px;
            left: -42px;
            top: 156px;
            position: absolute;
            text-align: center;
            color: white;
            font-size: 32px;
            font-weight: 400;
        }
        
        .text-personality {
            width: 459px;
            height: 54px;
            left: -42px;
            top: 240px;
            position: absolute;
            text-align: center;
            color: #125546;
            font-size: 48px;
            font-weight: 400;
            -webkit-text-stroke: 1px rgb(255, 255, 255); /* 描边宽度和颜色 */
        }
        
        .text-loading {
            width: 459px;
            height: 54px;
            left: -42px;
            top: 344px;
            position: absolute;
            text-align: center;
            color: #7EA600;
            font-size: 48px;
            font-weight: 400;
            text-shadow: 3px 3px 0px white;
        }
        
        .text-ready {
            width: 293px;
            height: 56px;
            left: 46px;
            top: 536px;
            position: absolute;
            text-align: center;
            color: #115043;
            font-size: 24px;
            font-weight: 400;
        }
        
        /* 进度条容器 */
        .progress-bar-container {
            width: 375px;
            height: 111px;
            left: 0px;
            top: 402px;
            position: absolute;
            z-index: 100;
        }
        
        .progress-bar-line {
            width: 179px;
            height: 24px;
            left: 70px;
            top: 425px;
            position: absolute;
        }
        
        /* 进度条元素 */
        .progress-dot1 {
            width: 51px;
            height: 5px;
            left: 125px;
            top: 427px;
            position: absolute;
            background: #92D0DF;
        }
        
        .progress-dot2 {
            width: 75px;
            height: 5px;
            left: 222px;
            top: 427px;
            position: absolute;
            background: #0092BA;
        }
        
        .progress-dot3 {
            width: 5px;
            height: 5px;
            left: 298px;
            top: 433px;
            position: absolute;
            background: #0092BA;
        }
        
        .progress-dot4 {
            width: 5.50px;
            height: 5.50px;
            left: 303px;
            top: 439px;
            position: absolute;
            background: #0092BA;
        }
        
        .progress-fill {
            width: 178.50px;
            height: 23.50px;
            left: 77px;
            top: 427px;
            position: absolute;
            background: #BBE36C;
        }
        
        /* 字体定义 */
        .font-bold {
            font-family: "Impact", "Arial Black", sans-serif;
        }
        
        .font-regular {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        
        /* 动画效果 */
        @keyframes loading {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        
        .text-loading {
            animation: loading 1.5s infinite;
        }
        
        /* 响应式调整 */
        @media (max-width: 400px) {
            .page-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="page-container">
        <!-- 背景图片 -->
        <img class="bg-image" src="assets/page15/bg.png" alt="背景图片">
        
        <!-- 文本内容 -->
        <div class="text-processing font-bold">正在合成你的终极皮肤</div>
        <div class="text-personality font-bold">年度学习人格</div>
        <div class="text-loading font-bold">Loading</div>
        <div class="text-ready font-regular">你准备好了吗?</div>
        
        <!-- 进度条 -->
        <img class="progress-bar-container" src="assets/page15/load.png" alt="进度条容器">
        <img class="progress-bar-line" src="assets/page15/line.png" alt="进度条基线">
        

    </div>
</body>
</html>
