<body>
    <div class="page-container">
        <!-- 背景图片 -->

        <!-- 内容图片 -->

        <!-- 标题 -->

        <!-- 互动数据 -->
        <div class="ai-qa font-regular">AI问答&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;次</div>

        <div class="discuss-count font-bold">342</div>

        <!-- 学习风格 -->

            <span class="font-bold">独立</span>
            <span class="font-regular">学习</span>
        </div>
        <div class="independent-percent font-regular">35%</div>
        
        <div class="social-learning">
            <span class="font-bold">社交</span>
            <span class="font-regular">学习</span>
        </div>
        <div class="social-percent font-regular">65%</div>
        
        <!-- 确认文本 -->
        <div class="confirm-text font-regular">确认过眼神</div>
        <div class="confirm-result">
            <span class="font-regular" style="font-size: 20px; text-shadow: 4px 4px 3px rgba(0, 0, 0, 0.80)">你是</span>
            <span class="font-regular" style="font-size: 32px; text-shadow: 4px 4px 3px rgba(0, 0, 0, 0.80)">【</span>
            <span class="font-bold" style="font-size: 32px; text-shadow: 4px 4px 3px rgba(0, 0, 0, 0.80)">社交学习</span>
            <span class="font-regular" style="font-size: 32px; text-shadow: 4px 4px 3px rgba(0, 0, 0, 0.80)">】</span>
            <span class="font-regular" style="font-size: 20px; text-shadow: 4px 4px 3px rgba(0, 0, 0, 0.80)">型选手</span>
        </div>
        
        <!-- 总结文本 -->
        <div class="summary-text font-regular">
            在"单机学习"和"组队开黑"间<br/>
            你找到了自己的平衡
        </div>
        
        <!-- 装饰图标 -->
        <img class="arrow-icon1" src="assets/page13/arrow.png" alt="向下翻页" onclick="nextPage()">
        <img class="ai-icon2" src="assets/page13/ai.png" alt="AI图标">
        <img class="chat-icon3" src="assets/page13/chat.png" alt="聊天图标">
        
        <!-- 进度条 -->
        <div class="progress-container progress-container-top"></div>
        <div class="progress-container progress-container-bottom"></div>
        <div class="progress-end"></div>
        <div class="progress-end progress-end-right"></div>
        <div class="progress-fill-independent"></div>
        <div class="progress-fill-social"></div>
    </div>

    <script>
        // 向下翻页功能
        function nextPage() {
            // 获取当前页面URL
            const currentUrl = window.location.href;
            
            // 获取当前页面编号（假设URL格式为 page13.html）
            const currentPage = parseInt(currentUrl.match(/page(\d+)\.html/)?.[1]) || 13;
            
            // 计算下一页编号
            const nextPageNum = currentPage + 1;
            
            // 构建下一页URL
            let nextUrl;
            if (nextPageNum <= 13) { // 假设总共有13页
                nextUrl = currentUrl.replace(`page${currentPage}.html`, `page${nextPageNum}.html`);
            } else {
                // 如果是最后一页，回到第一页或显示结束页
                nextUrl = currentUrl.replace(`page${currentPage}.html`, 'page1.html');
            }
            
            // 跳转到下一页
            window.location.href = nextUrl;
        }

        // 添加键盘事件监听（可选功能）
        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowDown' || event.key === ' ') {
                event.preventDefault();
                nextPage();
            }
        });
    </script>
</body>
