<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第2页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
        
        .page-2-exact {
            width: 375px;
            height: 812px;
            position: relative;
            background: white;
            overflow: hidden;
        }
        
        .page-2-exact .image-1 {
            width: 767px;
            height: 869px;
            left: -184px;
            top: -14px;
            position: absolute;
        }
        
        .page-2-exact .image-2 {
            width: 347.15px;
            height: 477.34px;
            left: 14px;
            top: 112px;
            position: absolute;
        }
        
        .page-2-exact .gradient-1 {
            width: 232px;
            height: 332px;
            left: 72px;
            top: 179px;
            position: absolute;
            background: linear-gradient(180deg, #D3A873 0%, #DDB881 45%, #DCB681 90%, #CB9D6A 100%);
        }
        
        .page-2-exact .gradient-2 {
            width: 231.82px;
            height: 331.93px;
            left: 71.79px;
            top: 178.68px;
            position: absolute;
            background: radial-gradient(ellipse 50.00% 50.00% at 50.00% 50.00%, rgba(153, 135.80, 111.81, 0) 0%, rgba(255, 226.33, 186.35, 0) 90%);
        }
        
        .page-2-exact .glow {
            width: 212px;
            height: 256px;
            left: 82px;
            top: 210px;
            position: absolute;
            background: radial-gradient(ellipse 50.00% 50.00% at 50.00% 50.00%, #FFF8DA 0%, rgba(237.50, 215.32, 173.11, 0.60) 73%, rgba(220, 183, 128, 0.20) 100%);
            border-radius: 9999px;
        }
        
        /* 文字容器 - 关键修复 */
        .page-2-exact .text-box {
            width: 222px;
            height: 309px;
            left: 72px;
            top: 191px;
            position: absolute;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        /* 精确的文字样式 */
        .page-2-exact .text-box span {
            color: #754530;
            font-family: "PingFang SC", "Microsoft YaHei", serif;
            font-weight: 400;
            line-height: 1.4;
            display: block;
            margin-bottom: 8px;
        }
        
        .page-2-exact .text-box .line-1 {
            font-size: 20px;
            line-height: 28px;
        }
        
        .page-2-exact .text-box .line-2 {
            font-size: 36px;
            font-weight: 600;
            margin: 15px 0;
            line-height: 44px;
        }
        
        .page-2-exact .text-box .line-3 {
            font-size: 20px;
            line-height: 28px;
        }
        
        /* 按钮 */
        .page-2-exact .arrow-btn {
            width: 189px;
            height: 34px;
            left: 93px;
            top: 717px;
            position: absolute;
            text-align: center;
            color: #333;
            font-size: 48px;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="page-2-exact">
        <!-- 使用你的图片 -->
        <img class="image-1" src="assets/page2/bg.png" alt="背景">
        <img class="image-2" src="assets/page2/book.png" alt="书籍">
        
        <div class="gradient-1"></div>
        <div class="gradient-2"></div>
        <div class="glow"></div>
        
        <!-- 文字内容 - 使用span分行 -->
        <div class="text-box">
            <span class="line-1">那些与星辰为伴 <br>同晨光赛跑的日子 <br>都在这份报告里</span>
            <span class="line-2">闪闪发光</span>
            <span class="line-3">准备好重逢<br>过去的自己了吗？</span>
        </div>
        
        <div class="arrow-btn" onclick="nextPage()">>>></div>
    </div>
    
    <script>
        function nextPage() {
            alert('下一页');
        }
    </script>
</body>
</html>
