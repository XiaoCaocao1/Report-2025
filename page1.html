<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>第一页</title>
    <style>
      /* 基础样式 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-font-smoothing: antialiased;
      }
      html, body {
        margin: 0;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f0f0f0;
      }
      
      /* 封面容器 */
      .element {
        background-color: #ffffff;
        overflow: hidden;
        width: 375px;
        min-width: 375px;
        min-height: 812px;
        position: relative;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      }
      
      /* 背景图片 */
      .element .image {
        top: 0;
        left: -77px;
        width: 542px;
        height: 812px;
        aspect-ratio: 0.67;
        position: absolute;
        object-fit: cover;
      }
      
      /* 2025 文字 */
      .element .text-wrapper {
        position: absolute;
        top: 200px;
        left: 33px;
        width: 144px;
        text-shadow: 0px 4px 4px #00000080;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        font-weight: 400;
        color: #feffed;
        font-size: 64px;
        letter-spacing: 0;
        line-height: normal;
        white-space: nowrap;
      }
      
      /* 年度学习报告 */
      .element .div {
        top: 276px;
        text-shadow: 0px 4px 4px #00000080;
        color: #ffffff;
        font-size: 48px;
        position: absolute;
        left: 33px;
        width: 308px;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        font-weight: 400;
        letter-spacing: 0;
        line-height: normal;
      }
      
      /* 解锁你的专属学习人格 */
      .element .text-wrapper-2 {
        top: 341px;
        text-shadow: 0px 4px 4px #00000040;
        color: #fdffda;
        font-size: 24px;
        position: absolute;
        left: 33px;
        width: 308px;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        font-weight: 400;
        letter-spacing: 0;
        line-height: normal;
      }
      
      /* 装饰图标 */
      .element .img {
        top: 194px;
        left: 166px;
        width: 88px;
        height: 88px;
        aspect-ratio: 1;
        position: absolute;
        object-fit: cover;
      }
      
      /* 开始按钮 */
      .element .frame {
        position: absolute;
        top: 646px;
        left: 77px;
        width: 220px;
        height: 72px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="element">
      <img class="image" src="assets/page1/image-16.png" />
      <div class="text-wrapper">2025</div>
      <div class="div">年度学习报告</div>
      <div class="text-wrapper-2">解锁你的专属学习人格</div>
      <img class="img" src="assets/page1/image-18.png" />
      <img class="frame" src="assets/page1/frame-4.svg" />
    </div>
    
    <script>
      // 简单交互：点击按钮提示
      document.querySelector('.frame').addEventListener('click', function() {
        alert('🎉 开始你的2025年度学习报告！');
      });
    </script>
  </body>
</html>
