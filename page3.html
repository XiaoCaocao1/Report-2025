<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年度学习报告 - 第3页</title>
    <style>
        /* 基础样式 - 保持与前两页一致 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        
        /* 页面容器 */
        .page-container {
            width: 375px;
            height: 812px;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        /* 背景图片 */
        .bg-image {
            width: 767px;
            height: 869px;
            left: -178px;
            top: -10px;
            position: absolute;
            object-fit: cover;
        }
        
        /* 底部文字 */
        .bottom-text {
            left: 44px;
            top: 626px;
            position: absolute;
            text-align: center;
            color: white;
            font-size: 20px;
            line-height: 1.5;
        }
        
        /* 标题 */
        .title-text {
            width: 308px;
            height: 116px;
            left: 34px;
            top: 52px;
            position: absolute;
            text-align: center;
            color: white;
            font-size: 40px;
            font-weight: 600;
            line-height: 1.3;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        
        /* 数据卡片容器 */
        .stats-container {
            width: 344px;
            left: 18px;
            top: 194px;
            position: absolute;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        /* 统计行 */
        .stats-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        /* 数据卡片 */
        .stat-card {
            width: 150px;
            height: 120px;
            background: #FFEAC1;
            border-radius: 10px;
            position: relative;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        /* 卡片标题 */
        .stat-title {
            color: #4B1715;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        /* 数据值 */
        .stat-value {
            color: #4B1715;
            font-size: 24px;
            font-weight: 600;
        }
        
        /* 图标容器 */
        .stat-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
        }
        
        .stat-icon img {
            width: 24px;
            height: 24px;
        }
        
        /* 双图标容器 */
        .double-icons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            width: 100%;
            height: 40px;
            margin-bottom: 8px;
        }
        
        .double-icons img {
            width: 24px;
            height: 24px;
        }
        
        /* 下一页按钮 */
        .next-button {
            width: 189px;
            height: 34px;
            left: 89px;
            top: 714px;
            position: absolute;
            text-align: center;
            color: white;
            font-size: 48px;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
        }
        
        .next-button:hover {
            transform: translateX(5px);
        }
        
        /* 响应式调整 */
        @media (max-width: 400px) {
            .page-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="page-container" id="page-3">
        <!-- 背景图片 -->
        <img class="bg-image" src="assets/page3/bg.png" alt="背景">
        
        <!-- 标题 -->
        <div class="title-text">
            2025<br>课程中心
        </div>
        
        <!-- 底部文字 -->
        <div class="bottom-text">
            每个数字<br>都闪烁着好奇与探索的光芒
        </div>
        
        <!-- 数据统计 -->
        <div class="stats-container">
            <!-- 第1行 -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-icon">
                        <img src="assets/icon/eye.png" alt="访问量图标">
                    </div>
                    <div class="stat-title">总访问量</div>
                    <div class="stat-value">4,364,900</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">
                        <img src="assets/icon/homework.png" alt="作业图标">
                    </div>
                    <div class="stat-title">作业总量</div>
                    <div class="stat-value">554,426</div>
                </div>
            </div>
            
            <!-- 第2行 -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-icon">
                        <img src="assets/icon/paper.png" alt="试卷图标">
                    </div>
                    <div class="stat-title">试卷总数</div>
                    <div class="stat-value">748,382</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">
                        <img src="assets/icon/ai.png" alt="AI图标">
                    </div>
                    <div class="stat-title">AI咨询总数</div>
                    <div class="stat-value">36,288</div>
                </div>
            </div>
            
            <!-- 第3行 - 修改为双图标 -->
            <div class="stats-row">
                <!-- 教师卡片 - 双图标 -->
                <div class="stat-card">
                    <div class="double-icons">
                        <img src="assets/icon/teacher-1.png" alt="教师图标">
                        <img src="assets/icon/teacher-2.png" alt="教师图标">
                    </div>
                    <div class="stat-title">活跃教师</div>
                    <div class="stat-value">688</div>
                </div>
                
                <!-- 学生卡片 - 双图标 -->
                <div class="stat-card">
                    <div class="double-icons">
                        <img src="assets/icon/student-1.png" alt="学生图标">
                        <img src="assets/icon/student-2.png" alt="学生图标">
                    </div>
                    <div class="stat-title">活跃学生</div>
                    <div class="stat-value">18,887</div>
                </div>
            </div>
        </div>
        
        <!-- 下一页按钮 -->
        <div class="next-button" onclick="nextPage()">>>></div>
    </div>
    
    <script>
        function nextPage() {
            alert('📊 查看下一个数据...');
            // 这里可以添加跳转到下一页的逻辑
        }
        
        // 页面加载动画
        window.addEventListener('load', function() {
            const page = document.getElementById('page-3');
            page.style.opacity = '0';
            page.style.transform = 'scale(0.9)';
            
            setTimeout(() => {
                page.style.transition = 'all 0.8s ease-out';
                page.style.opacity = '1';
                page.style.transform = 'scale(1)';
            }, 300);
        });
    </script>
</body>
</html>
